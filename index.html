<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Apotek Mitra Sehat</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div
      class="bg-white border border-gray-200 rounded-xl p-8 w-full max-w-sm shadow-sm"
    >
      <div class="flex flex-col items-center mb-6">
        <div
          class="w-12 h-12 bg-gray-100 rounded-lg flex items-center justify-center mb-3"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 text-gray-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2h-4M9 3a2 2 0 002 2h2a2 2 0 002-2M9 3a2 2 0 012-2h2a2 2 0 012 2m-6 9h6m-3-3v6"
            />
          </svg>
        </div>
        <h1 class="text-lg font-semibold text-gray-800">Apotek Mitra Sehat</h1>
        <p class="text-sm text-gray-400 mt-1">
          Masuk ke akun admin untuk melanjutkan
        </p>
      </div>

      <div class="mb-4">
        <label class="block text-sm text-gray-500 mb-1">Username</label>
        <input
          type="text"
          placeholder="Masukkan username"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:border-gray-400"
        />
      </div>

      <div class="mb-6">
        <label class="block text-sm text-gray-500 mb-1">Password</label>
        <input
          type="password"
          placeholder="Masukkan password"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:border-gray-400"
        />
      </div>

      <button
        class="w-full bg-gray-800 text-white text-sm rounded-lg py-2 hover:bg-gray-700 transition"
      >
        Masuk
      </button>

      <hr class="my-5 border-gray-100" />
      <p class="text-center text-xs text-gray-400">
        Hanya dapat diakses oleh admin apotek
      </p>
    </div>
  </body>
</html>
